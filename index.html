<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Nation Shield — 4 сезон</title>
    <link rel="icon" type="image/jpg" href="https://raw.githubusercontent.com/NationShield/NationShield.github.io/refs/heads/main/img/server.jpg">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; image-rendering: crisp-edges; image-rendering: pixelated; }
        
        body { 
            background: #0a0a0a;
            color: #ffffff;
            line-height: 1.5;
            font-family: 'Minecraft', 'Courier New', monospace;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        
        @font-face {
            font-family: 'Minecraft';
            src: url('https://cdn.jsdelivr.net/gh/NationShield/NationShield.github.io@main/Minecraft.ttf') format('truetype');
            font-display: swap;
        }
        
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
        }
        
        .container { width: 90%; max-width: 900px; margin: 0 auto; padding: 0 15px; }
        
        .header {
            background: #1a1a1a;
            border-bottom: 4px solid #ffa500;
            padding: 0.8rem 0;
        }
        .header-content { display: flex; justify-content: center; align-items: center; }
        .logo { display: flex; align-items: center; gap: 10px; text-decoration: none; color: #ffffff; font-size: 1.1rem; text-shadow: 2px 2px 0 #5a3a00; }
        .logo-icon {
            width: 32px; height: 32px;
            background: url('https://raw.githubusercontent.com/NationShield/NationShield.github.io/refs/heads/main/img/server.jpg');
            background-size: cover;
            border: 2px solid #ffa500;
            image-rendering: pixelated;
        }
        
        .hero {
            text-align: center;
            padding: 3rem 1rem;
            background: linear-gradient(135deg, rgba(10,10,10,0.9), rgba(26,26,26,0.95)), url('https://raw.githubusercontent.com/NationShield/NationShield.github.io/refs/heads/main/img/me.jpg');
            background-size: cover;
            background-position: center;
            border: 4px solid #ffa500;
            margin: 2rem 0;
            box-shadow: 0 8px 0 #5a3a00;
        }
        .hero-title { font-size: 2rem; margin-bottom: 0.8rem; letter-spacing: 2px; text-shadow: 3px 3px 0 #5a3a00; font-family: 'Minecraft', 'Courier New', monospace; }
        .hero-title span { color: #ffa500; }
        
        .season-block {
            background: #1a1a1a;
            border: 3px solid #ffa500;
            padding: 2rem;
            margin: 1rem 0;
        }
        .season-block h2 {
            color: #ffa500;
            font-size: 1.5rem;
            margin-bottom: 1rem;
            text-shadow: 2px 2px 0 #5a3a00;
        }
        .season-block p {
            color: #cccccc;
            font-size: 0.9rem;
            margin-bottom: 0.8rem;
        }
        
        .footer {
            background: #1a1a1a;
            border-top: 4px solid #ffa500;
            padding: 1rem 0;
            margin-top: 2rem;
        }
        .footer-content { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 1rem; }
        .footer-left { color: #aaaaaa; font-size: 0.65rem; text-shadow: 1px 1px 0 #000; font-family: 'Minecraft', 'Courier New', monospace; }
        .footer-right { display: flex; gap: 1rem; }
        .footer-link {
            width: 36px; height: 36px;
            background: #2a2a2a;
            border: 2px solid #5a5a5a;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }
        .footer-link:hover { transform: scale(1.1); border-color: #ffa500; background: #3a3a3a; }
        .footer-link.telegram {
            background-image: url('https://raw.githubusercontent.com/NationShield/NationShield.github.io/refs/heads/main/img/te.png');
            background-size: 55%;
            background-position: center;
            background-repeat: no-repeat;
        }
        .footer-link.discord {
            background-image: url('https://raw.githubusercontent.com/NationShield/NationShield.github.io/refs/heads/main/img/di.png');
            background-size: 55%;
            background-position: center;
            background-repeat: no-repeat;
            cursor: pointer;
        }
        .website-version { font-size: 0.55rem; color: #aaaaaa; opacity: 0.6; text-shadow: 1px 1px 0 #000; font-family: 'Minecraft', 'Courier New', monospace; }
        
        @media (max-width: 600px) {
            .hero-title { font-size: 1.5rem; }
            .hero { padding: 2rem 1rem; }
            .season-block { padding: 1.5rem; }
        }
    </style>
</head>
<body>
    <div class="main-content">
        <header class="header">
            <div class="container header-content">
                <div class="logo"><div class="logo-icon"></div><span>Nation Shield</span></div>
            </div>
        </header>

        <main class="container">
            <div class="hero">
                <h1 class="hero-title">Nation <span>Shield</span></h1>
                <div class="season-block">
                    <i class="fas fa-tools" style="font-size: 2.5rem; color: #ffa500; margin-bottom: 1rem; display: block;"></i>
                    <h2>⚔️ 4 СЕЗОН ⚔️</h2>
                    <p>Идёт подготовка к запуску 4 сезона</p>
                    <p>IP-адрес и дата старта будут объявлены позже</p>
                    <p style="margin-top: 1rem; font-size: 0.8rem; color: #888;">Следите за новостями в Telegram</p>
                </div>
            </div>
        </main>

        <footer class="footer">
            <div class="container">
                <div class="footer-content">
                    <div class="footer-left" id="copyrightYear"></div>
                    <div class="footer-right">
                        <a href="https://t.me/NationShieldAternos" target="_blank" class="footer-link telegram"></a>
                        <a href="#" class="footer-link discord" id="discordLink"></a>
                    </div>
                    <div class="website-version">4 СЕЗОН</div>
                </div>
            </div>
        </footer>
    </div>

    <script>
        document.getElementById('copyrightYear').innerHTML = '© ' + new Date().getFullYear() + ' Nation Shield';
        
        document.getElementById('discordLink').addEventListener('click', function(e) {
            e.preventDefault();
            alert('Дискорд сервер будет объявлен позже');
        });
    </script>
</body>
</html>
